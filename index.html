<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🏛️ 경매 Council — 분석 보고서</title>
  <style>
    :root{ --nav-bg:#1e293b; --accent:#3b82f6; --green:#16a34a; --yellow:#d97706;
      --text:#212529; --muted:#6c757d; --border:#e9ecef; --surface:#f8f9fa; --radius:12px; }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#fff;color:var(--text);line-height:1.7;}
    nav{background:var(--nav-bg);color:#f1f5f9;height:56px;display:flex;align-items:center;padding:0 24px;font-weight:700;}
    .wrap{max-width:820px;margin:0 auto;padding:40px 20px 80px;}
    h1{font-size:26px;font-weight:800;margin-bottom:8px;}
    .sub{color:var(--muted);margin-bottom:32px;font-size:15px;}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    @media(max-width:640px){.grid{grid-template-columns:1fr;}}
    a.card{display:block;border:1px solid var(--border);border-radius:var(--radius);padding:22px;text-decoration:none;color:inherit;transition:.15s;background:var(--surface);}
    a.card:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(0,0,0,.06);transform:translateY(-2px);}
    .tag{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:10px;}
    .tag.compare{background:#f5f3ff;color:#7c3aed;}
    .tag.detail{background:#eff6ff;color:var(--accent);}
    .card h2{font-size:17px;font-weight:700;margin-bottom:6px;}
    .card p{font-size:13px;color:var(--muted);}
    .card .go{margin-top:14px;font-size:13px;color:var(--accent);font-weight:600;}
    footer{margin-top:48px;padding-top:20px;border-top:1px solid var(--border);font-size:12px;color:var(--muted);text-align:center;}
  </style>
</head>
<body>
<nav>🏛️ 경매 Council</nav>
<div class="wrap">
  <h1>경매 분석 보고서</h1>
  <p class="sub">법원경매 물건 권리·시세·수익성 분석 · 생성일 2026-07-09</p>
  <div class="grid">
    <a class="card" href="report-compare-3.html">
      <span class="tag compare">📊 비교분석</span>
      <h2>3물건 비교 분석</h2>
      <p>시흥동 빌라 · 호매실 아파트 · 양주 아파트 — 권리·시세·수익 3축 비교 및 입찰 우선순위</p>
      <div class="go">보고서 열기 →</div>
    </a>
    <a class="card" href="report-2025ta580-siheung.html">
      <span class="tag detail">🔍 상세분석</span>
      <h2>시흥동 해비치빌 504호</h2>
      <p>2025타경580 · 서울 금천구 · 다세대 38.97㎡ — 권리분석·실거래 시세·낙찰가별 수익 시뮬레이션</p>
      <div class="go">보고서 열기 →</div>
    </a>
  </div>
  <footer>본 보고서는 투자 참고용이며, 최종 입찰 결정과 결과에 대한 책임은 투자자 본인에게 있습니다.</footer>
</div>
</body>
</html>
